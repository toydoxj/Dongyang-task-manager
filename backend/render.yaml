services:
  - type: web
    name: dy-task-backend
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
      env -u VIRTUAL_ENV uv run alembic upgrade head
    startCommand: env -u VIRTUAL_ENV uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_ASSIGN_LOG
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: CORS_ORIGINS
        value: https://task.dyce.kr,http://localhost:3000
      - key: SYNC_ENABLED
        value: "true"
      - key: SYNC_INTERVAL_MINUTES
        value: "5"
      - key: CRON_SECRET
        sync: false
      # ── NAVER WORKS OIDC SSO (Phase 1) ──
      # ENABLED는 운영자가 dashboard에서 toggle (value:로 박으면 재배포가 dashboard 값을 덮어씀)
      - key: WORKS_ENABLED
        sync: false
      - key: WORKS_CLIENT_ID
        sync: false
      - key: WORKS_CLIENT_SECRET
        sync: false
      - key: WORKS_DOMAIN_ID
        sync: false
      - key: WORKS_REDIRECT_URI
        value: https://api.dyce.kr/api/auth/works/callback
      - key: WORKS_ISSUER
        value: https://auth.worksmobile.com
      - key: FRONTEND_BASE_URL
        value: https://task.dyce.kr
      - key: WORKS_BLOCKED_EMAILS
        value: dyce@dyce.kr
      # ── NAVER WORKS Drive (Phase 2 — admin user-token 위임 방식) ──
      # SSO callback 1개를 두 흐름이 공유 (NAVER WORKS Console redirect URI 절약).
      # admin이 /api/admin/drive/connect 호출 → /api/auth/works/login?drive=1로 redirect →
      # state.d==1 → SSO callback이 admin/scope 검증 후 drive_credentials 저장.
      - key: WORKS_DRIVE_ENABLED
        sync: false
      - key: WORKS_DRIVE_SHAREDRIVE_ID
        sync: false
      - key: WORKS_DRIVE_ROOT_FOLDER_ID
        sync: false
      # NAVER WORKS Drive 탐색기 가상 드라이브 마운트 경로 (옵션, 사내 표준 경로).
      # 비어두면 "탐색기 열기"·"경로 복사" 버튼 비표시.
      # W: 드라이브에 NAVER WORKS Drive 마운트 시 '공용 드라이브\[업무관리]' 경로 사용.
      - key: WORKS_DRIVE_LOCAL_ROOT
        value: "W:\\공용 드라이브\\[업무관리]"
      # ── NAVER WORKS Calendar (Phase 3 — task 동기화) ──
      # Drive와 같은 OAuth 토큰 사용 (scope에 'calendar' 포함). 별도 자격 증명 불필요.
      # 공유 캘린더 ID는 /api/admin/calendar/create-shared-calendar 호출 후 dashboard에 저장.
      - key: WORKS_CALENDAR_ENABLED
        sync: false
      - key: WORKS_SHARED_CALENDAR_ID
        sync: false

  # ── 5분 incremental sync 외부 트리거 ──
  # backend 안의 APScheduler는 worker process에 종속적 (process restart 시 reset).
  # 별도 cron 서비스가 5분마다 /api/cron/sync 호출해 안정성 확보.
  # backend cron 엔드포인트는 fire-and-forget(202)이라 호출 자체는 1초 미만.
  - type: cron
    name: dy-task-sync-cron
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "*/5 * * * *"
    buildCommand: pip install httpx
    startCommand: |
      python -c "import os, httpx; r = httpx.post('https://api.dyce.kr/api/cron/sync', headers={'Authorization': 'Bearer ' + os.environ['CRON_SECRET']}, timeout=60); print(r.status_code, r.text)"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CRON_SECRET
        sync: false
