services:
  - type: web
    name: dy-task-backend
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip uv
      uv sync --frozen --no-dev
      uv run alembic upgrade head
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_ASSIGN_LOG
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: CORS_ORIGINS
        value: https://task.dyce.kr,http://localhost:3000
      - key: SYNC_ENABLED
        value: "true"
      - key: SYNC_INTERVAL_MINUTES
        value: "5"
      - key: CRON_SECRET
        sync: false
