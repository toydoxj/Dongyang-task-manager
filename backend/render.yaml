services:
  - type: web
    name: dy-task-backend
    runtime: docker
    region: singapore
    plan: standard
    rootDir: backend
    # PR-FL: 매 git push origin main 시 자동 deploy 활성화. dashboard에서 누군가 off로
    # 토글해도 다음 deploy 시 yaml 값으로 덮어씀 (영구 고정).
    autoDeploy: true
    # monorepo에서 frontend/docs 변경만으로 backend Docker build가 도는 것을 차단.
    # Render build pipeline minutes가 과금되므로 backend 관련 변경만 자동 배포한다.
    buildFilter:
      paths:
        - backend/**
    # Dockerfile이 dependency 설치 + alembic upgrade + uvicorn 기동을 모두 처리.
    # WeasyPrint(한글 PDF)용 cairo/pango/fonts-nanum이 image에 포함됨.
    dockerfilePath: ./Dockerfile
    # INCIDENT #1 교훈 #1 (PR-DY): /health는 DB 안 거치므로 connection pool 고갈
    # 사고에서 backend가 healthy로 인식되어 Render auto-restart trigger 안 됐음.
    # /api/health/db는 SELECT 1 + idle_in_transaction_session_timeout SHOW까지
    # 거쳐 503 반환 → Render auto-restart trigger. PR-AQ + PR-DA 안전망과 합쳐
    # connection leak 사고 즉시 복구.
    healthCheckPath: /api/health/db
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_ASSIGN_LOG
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: NOTION_DB_CONTRACT_ITEMS
        sync: false
      - key: NOTION_DB_SALES
        sync: false
      - key: NOTION_DB_SEAL_REQUESTS
        sync: false
      - key: NOTION_DB_SUGGESTIONS
        sync: false
      - key: CORS_ORIGINS
        value: https://task.dyce.kr,http://localhost:3000
      # 외부 cron service들이 sync 처리하므로 web 내부 APScheduler 영구 비활성.
      # render.yaml에 value:로 박아 dashboard toggle이 매 빌드마다 덮어써지지 않게 고정.
      - key: SYNC_ENABLED
        value: "false"
      - key: SYNC_INTERVAL_MINUTES
        value: "5"
      - key: CRON_SECRET
        sync: false
      # ── NAVER WORKS OIDC SSO (Phase 1) ──
      # ENABLED는 운영자가 dashboard에서 toggle (value:로 박으면 재배포가 dashboard 값을 덮어씀)
      - key: WORKS_ENABLED
        sync: false
      - key: WORKS_CLIENT_ID
        sync: false
      - key: WORKS_CLIENT_SECRET
        sync: false
      - key: WORKS_DOMAIN_ID
        sync: false
      - key: WORKS_REDIRECT_URI
        value: https://api.dyce.kr/api/auth/works/callback
      - key: WORKS_ISSUER
        value: https://auth.worksmobile.com
      - key: FRONTEND_BASE_URL
        value: https://task.dyce.kr
      - key: WORKS_BLOCKED_EMAILS
        value: dyce@dyce.kr
      # ── NAVER WORKS Drive (Phase 2 — admin user-token 위임 방식) ──
      # SSO callback 1개를 두 흐름이 공유 (NAVER WORKS Console redirect URI 절약).
      # admin이 /api/admin/drive/connect 호출 → /api/auth/works/login?drive=1로 redirect →
      # state.d==1 → SSO callback이 admin/scope 검증 후 drive_credentials 저장.
      - key: WORKS_DRIVE_ENABLED
        sync: false
      - key: WORKS_DRIVE_SHAREDRIVE_ID
        sync: false
      - key: WORKS_DRIVE_ROOT_FOLDER_ID
        sync: false
      # NAVER WORKS Drive 탐색기 가상 드라이브 마운트 경로 (옵션, 사내 표준 경로).
      # 비어두면 "탐색기 열기"·"경로 복사" 버튼 비표시.
      # W: 드라이브에 NAVER WORKS Drive 마운트 시 '공용 드라이브\[업무관리]' 경로 사용.
      - key: WORKS_DRIVE_LOCAL_ROOT
        value: "W:\\공용 드라이브\\[업무관리]"
      # ── NAVER WORKS Calendar (Phase 3 — task 동기화) ──
      # Drive와 같은 OAuth 토큰 사용 (scope에 'calendar' 포함). 별도 자격 증명 불필요.
      # 공유 캘린더 ID는 /api/admin/calendar/create-shared-calendar 호출 후 dashboard에 저장.
      - key: WORKS_CALENDAR_ENABLED
        sync: false
      - key: WORKS_SHARED_CALENDAR_ID
        sync: false

  # ── 노션 동기화 정책 (PR-FN Phase 2, 2026-05-25) ──
  # 시스템 원칙: 노션 = 백업/관리용. 모든 운영 DB는 mirror.
  # write-through(create/update/approve/reject)로 frontend 변경은 즉시 mirror 반영.
  # 노션에서 직접 변경하는 경우만 새벽까지 lag (운영자 합의).
  #
  # 옛 구성(2026-05-25 제거): 5분 incremental 4 cron (projects/tasks/master/others)
  #   업무시간(KST 06-20) 회피해서 KST 20-06시 새벽만 실행 중이긴 했음.
  #   사용자 facing 흐름이 mirror-only로 전환됐으니(PR-FK/FL/FM) 이 빈도도 과도.
  # 새 구성: cron service는 HTTP trigger만 수행하고 실제 작업은 backend web에서 실행.
  # 여러 Python cron이 매 push마다 uv sync를 반복하면 Render build pipeline minutes가
  # 서비스 수만큼 누적되므로, cron 자체는 buildCommand=true로 고정한다.
  #
  # 필요 시 admin이 frontend `/admin/sync` 페이지 또는
  # `POST /api/admin/sync/run {"kind":"<kind>","full":true}` 호출.
  #
  # ── 새벽 full reconcile (모든 kind + archive 정리) ──
  # incremental은 변경분만 처리 — 노션에서 archive된 row를 mirror에서 정리
  # (_mark_missing_archived)하지 않음. full sync 1회로 모든 정합성 확보.
  - type: cron
    name: dy-task-sync-full
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    autoDeployTrigger: "off"
    schedule: "0 18 * * *"            # UTC 18:00 = KST 03:00
    buildCommand: "true"
    startCommand: |
      python -c "import os, urllib.request; req = urllib.request.Request('https://api.dyce.kr/api/cron/sync?full=true&force=true', method='POST', headers={'Authorization': 'Bearer ' + os.environ['CRON_SECRET']}); print(urllib.request.urlopen(req, timeout=60).read().decode())"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CRON_SECRET
        sync: false

  # ── PR-FO Phase 1.3.1 Outbox drain trigger ──
  # write endpoint이 mirror update + outbox enqueue 후 사용자에게 즉시 응답.
  # backend web의 /api/cron/outbox-drain이 pending/retry row를 배치 픽업해
  # 노션 push. cron service는 HTTP trigger만 수행해 별도 Python app build를 없앤다.
  # Notion은 백업/관리용이므로 최대 5분 lag를 허용한다.
  - type: cron
    name: dy-task-outbox-drain
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    autoDeployTrigger: "off"
    schedule: "*/5 * * * *"          # 5분마다
    buildCommand: "true"
    startCommand: |
      python -c "import os, urllib.request; req = urllib.request.Request('https://api.dyce.kr/api/cron/outbox-drain?batch=20', method='POST', headers={'Authorization': 'Bearer ' + os.environ['CRON_SECRET']}); print(urllib.request.urlopen(req, timeout=60).read().decode())"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CRON_SECRET
        sync: false

  # ── 매일 아침 task 자동 진행 트리거 ──
  # 시작일이 도래한 task를 '진행 중'으로 + 그 프로젝트 진행단계 '진행중'으로.
  # KST 09:00 = UTC 00:00. Render cron은 UTC 기준.
  - type: cron
    name: dy-task-auto-progress-cron
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    autoDeployTrigger: "off"
    schedule: "0 0 * * *"
    buildCommand: "true"
    startCommand: |
      python -c "import os, urllib.request; req = urllib.request.Request('https://api.dyce.kr/api/cron/auto-progress', method='POST', headers={'Authorization': 'Bearer ' + os.environ['CRON_SECRET']}); print(urllib.request.urlopen(req, timeout=60).read().decode())"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CRON_SECRET
        sync: false
