services:
  - type: web
    name: dy-task-backend
    runtime: docker
    region: singapore
    plan: standard
    rootDir: backend
    # Dockerfile이 dependency 설치 + alembic upgrade + uvicorn 기동을 모두 처리.
    # WeasyPrint(한글 PDF)용 cairo/pango/fonts-nanum이 image에 포함됨.
    dockerfilePath: ./Dockerfile
    # INCIDENT #1 교훈 #1 (PR-DY): /health는 DB 안 거치므로 connection pool 고갈
    # 사고에서 backend가 healthy로 인식되어 Render auto-restart trigger 안 됐음.
    # /api/health/db는 SELECT 1 + idle_in_transaction_session_timeout SHOW까지
    # 거쳐 503 반환 → Render auto-restart trigger. PR-AQ + PR-DA 안전망과 합쳐
    # connection leak 사고 즉시 복구.
    healthCheckPath: /api/health/db
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_ASSIGN_LOG
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: NOTION_DB_CONTRACT_ITEMS
        sync: false
      - key: CORS_ORIGINS
        value: https://task.dyce.kr,http://localhost:3000
      # 외부 cron service들이 sync 처리하므로 web 내부 APScheduler 영구 비활성.
      # render.yaml에 value:로 박아 dashboard toggle이 매 빌드마다 덮어써지지 않게 고정.
      - key: SYNC_ENABLED
        value: "false"
      - key: SYNC_INTERVAL_MINUTES
        value: "5"
      - key: CRON_SECRET
        sync: false
      # ── NAVER WORKS OIDC SSO (Phase 1) ──
      # ENABLED는 운영자가 dashboard에서 toggle (value:로 박으면 재배포가 dashboard 값을 덮어씀)
      - key: WORKS_ENABLED
        sync: false
      - key: WORKS_CLIENT_ID
        sync: false
      - key: WORKS_CLIENT_SECRET
        sync: false
      - key: WORKS_DOMAIN_ID
        sync: false
      - key: WORKS_REDIRECT_URI
        value: https://api.dyce.kr/api/auth/works/callback
      - key: WORKS_ISSUER
        value: https://auth.worksmobile.com
      - key: FRONTEND_BASE_URL
        value: https://task.dyce.kr
      - key: WORKS_BLOCKED_EMAILS
        value: dyce@dyce.kr
      # ── NAVER WORKS Drive (Phase 2 — admin user-token 위임 방식) ──
      # SSO callback 1개를 두 흐름이 공유 (NAVER WORKS Console redirect URI 절약).
      # admin이 /api/admin/drive/connect 호출 → /api/auth/works/login?drive=1로 redirect →
      # state.d==1 → SSO callback이 admin/scope 검증 후 drive_credentials 저장.
      - key: WORKS_DRIVE_ENABLED
        sync: false
      - key: WORKS_DRIVE_SHAREDRIVE_ID
        sync: false
      - key: WORKS_DRIVE_ROOT_FOLDER_ID
        sync: false
      # NAVER WORKS Drive 탐색기 가상 드라이브 마운트 경로 (옵션, 사내 표준 경로).
      # 비어두면 "탐색기 열기"·"경로 복사" 버튼 비표시.
      # W: 드라이브에 NAVER WORKS Drive 마운트 시 '공용 드라이브\[업무관리]' 경로 사용.
      - key: WORKS_DRIVE_LOCAL_ROOT
        value: "W:\\공용 드라이브\\[업무관리]"
      # ── NAVER WORKS Calendar (Phase 3 — task 동기화) ──
      # Drive와 같은 OAuth 토큰 사용 (scope에 'calendar' 포함). 별도 자격 증명 불필요.
      # 공유 캘린더 ID는 /api/admin/calendar/create-shared-calendar 호출 후 dashboard에 저장.
      - key: WORKS_CALENDAR_ENABLED
        sync: false
      - key: WORKS_SHARED_CALENDAR_ID
        sync: false

  # ── kind별 incremental sync — web worker 격리 ──
  # 이전: 외부 cron이 web /api/cron/sync 호출 → web worker 안에서 sync 진행.
  #       사용자 API 응답이 sync 시간만큼 지연되는 문제(502/timeout) 발생.
  # 새:   별도 cron container에서 `python -m app.scripts.sync_once`를 직접 실행.
  #       web service는 사용자 API만 처리, 자원 완전 격리.
  # kind별 빈도 차등 + schedule 분산으로 동시 부하 회피.
  # web service의 SYNC_ENABLED는 dashboard에서 false로 설정 — 내부 APScheduler 비활성.
  - type: cron
    name: dy-task-sync-projects
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    # 업무시간(KST 06~20시) 회피 — UTC 11~21시만 실행 (KST 20~06시).
    # cron 부담 줄임 + 업무 중 노션 미러 read 자원 최우선.
    # 필요 시 admin /admin/sync 페이지에서 즉시 트리거 가능.
    schedule: "*/5 11-21 * * *"      # 매 5분 :00 (UTC 11~21시 = KST 20~06시)
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind projects
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # 각 cron service에 backend web과 동일한 값으로 dashboard에서 입력 필요.
      # (Render Blueprint는 cron type에서 fromService env share 미지원)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false

  - type: cron
    name: dy-task-sync-tasks
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "2-59/5 11-21 * * *"   # 매 5분 :02 (UTC 11~21시 = KST 20~06시)
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind tasks
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # 각 cron service에 backend web과 동일한 값으로 dashboard에서 입력 필요.
      # (Render Blueprint는 cron type에서 fromService env share 미지원)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false

  - type: cron
    name: dy-task-sync-master
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "3,33 11-21 * * *"     # 30분 :03/:33 (UTC 11~21시 = KST 20~06시)
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind master
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # 각 cron service에 backend web과 동일한 값으로 dashboard에서 입력 필요.
      # (Render Blueprint는 cron type에서 fromService env share 미지원)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false

  - type: cron
    name: dy-task-sync-others
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "15,45 11-21 * * *"    # 30분 :15/:45 (UTC 11~21시 = KST 20~06시)
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: |
      env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind clients && \
      env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind cashflow && \
      env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind expense && \
      env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind contract_items
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # 각 cron service에 backend web과 동일한 값으로 dashboard에서 입력 필요.
      # (Render Blueprint는 cron type에서 fromService env share 미지원)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: NOTION_DB_CONTRACT_ITEMS
        sync: false

  # ── 새벽 full reconcile (archive 정리) ──
  # incremental 5분 cron은 변경분만 처리 — 노션에서 archive된 row를 mirror에서
  # 정리(_mark_missing_archived)하지 않음. 매일 새벽 1회 full sync로 보강.
  - type: cron
    name: dy-task-sync-full
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "0 18 * * *"            # UTC 18:00 = KST 03:00
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --full
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: NOTION_DB_CONTRACT_ITEMS
        sync: false

  # ── 매일 아침 task 자동 진행 트리거 ──
  # 시작일이 도래한 task를 '진행 중'으로 + 그 프로젝트 진행단계 '진행중'으로.
  # KST 09:00 = UTC 00:00. Render cron은 UTC 기준.
  - type: cron
    name: dy-task-auto-progress-cron
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "0 0 * * *"
    buildCommand: pip install httpx
    startCommand: |
      python -c "import os, httpx; r = httpx.post('https://api.dyce.kr/api/cron/auto-progress', headers={'Authorization': 'Bearer ' + os.environ['CRON_SECRET']}, timeout=60); print(r.status_code, r.text)"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CRON_SECRET
        sync: false
