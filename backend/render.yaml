services:
  - type: web
    name: dy-task-backend
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
      env -u VIRTUAL_ENV uv run alembic upgrade head
    startCommand: env -u VIRTUAL_ENV uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_ASSIGN_LOG
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: CORS_ORIGINS
        value: https://task.dyce.kr,http://localhost:3000
      - key: SYNC_ENABLED
        value: "true"
      - key: SYNC_INTERVAL_MINUTES
        value: "5"
      - key: CRON_SECRET
        sync: false
      # в”Җв”Җ NAVER WORKS OIDC SSO (Phase 1) в”Җв”Җ
      # ENABLEDлҠ” мҡҙмҳҒмһҗк°Җ dashboardм—җм„ң toggle (value:лЎң л°•мңјл©ҙ мһ¬л°°нҸ¬к°Җ dashboard к°’мқ„ лҚ®м–ҙм”Җ)
      - key: WORKS_ENABLED
        sync: false
      - key: WORKS_CLIENT_ID
        sync: false
      - key: WORKS_CLIENT_SECRET
        sync: false
      - key: WORKS_DOMAIN_ID
        sync: false
      - key: WORKS_REDIRECT_URI
        value: https://api.dyce.kr/api/auth/works/callback
      - key: WORKS_ISSUER
        value: https://auth.worksmobile.com
      - key: FRONTEND_BASE_URL
        value: https://task.dyce.kr
      - key: WORKS_BLOCKED_EMAILS
        value: dyce@dyce.kr
      # в”Җв”Җ NAVER WORKS Drive (Phase 2 вҖ” admin user-token мң„мһ„ л°©мӢқ) в”Җв”Җ
      # SSO callback 1к°ңлҘј л‘җ нқҗлҰ„мқҙ кіөмң  (NAVER WORKS Console redirect URI м Ҳм•Ҫ).
      # adminмқҙ /api/admin/drive/connect нҳём¶ң вҶ’ /api/auth/works/login?drive=1лЎң redirect вҶ’
      # state.d==1 вҶ’ SSO callbackмқҙ admin/scope кІҖмҰқ нӣ„ drive_credentials м ҖмһҘ.
      - key: WORKS_DRIVE_ENABLED
        sync: false
      - key: WORKS_DRIVE_SHAREDRIVE_ID
        sync: false
      - key: WORKS_DRIVE_ROOT_FOLDER_ID
        sync: false
      # NAVER WORKS Drive нғҗмғүкё° к°ҖмғҒ л“ңлқјмқҙлёҢ л§ҲмҡҙнҠё кІҪлЎң (мҳөм…ҳ, мӮ¬лӮҙ н‘ңмӨҖ кІҪлЎң).
      # л№„м–ҙл‘җл©ҙ "нғҗмғүкё° м—ҙкё°"В·"кІҪлЎң ліөмӮ¬" лІ„нҠј л№„н‘ңмӢң.
      # W: л“ңлқјмқҙлёҢм—җ NAVER WORKS Drive л§ҲмҡҙнҠё мӢң 'кіөмҡ© л“ңлқјмқҙлёҢ\[м—…л¬ҙкҙҖлҰ¬]' кІҪлЎң мӮ¬мҡ©.
      - key: WORKS_DRIVE_LOCAL_ROOT
        value: "W:\\кіөмҡ© л“ңлқјмқҙлёҢ\\[м—…л¬ҙкҙҖлҰ¬]"
      # в”Җв”Җ NAVER WORKS Calendar (Phase 3 вҖ” task лҸҷкё°нҷ”) в”Җв”Җ
      # DriveмҷҖ к°ҷмқҖ OAuth нҶ нҒ° мӮ¬мҡ© (scopeм—җ 'calendar' нҸ¬н•Ё). лі„лҸ„ мһҗкІ© мҰқлӘ… л¶Ҳн•„мҡ”.
      # кіөмң  мәҳлҰ°лҚ” IDлҠ” /api/admin/calendar/create-shared-calendar нҳём¶ң нӣ„ dashboardм—җ м ҖмһҘ.
      - key: WORKS_CALENDAR_ENABLED
        sync: false
      - key: WORKS_SHARED_CALENDAR_ID
        sync: false

  # в”Җв”Җ kindлі„ incremental sync вҖ” web worker кІ©лҰ¬ в”Җв”Җ
  # мқҙм „: мҷёл¶Җ cronмқҙ web /api/cron/sync нҳём¶ң вҶ’ web worker м•Ҳм—җм„ң sync м§„н–ү.
  #       мӮ¬мҡ©мһҗ API мқ‘лӢөмқҙ sync мӢңк°„л§ҢнҒј м§Җм—°лҗҳлҠ” л¬ём ң(502/timeout) л°ңмғқ.
  # мғҲ:   лі„лҸ„ cron containerм—җм„ң `python -m app.scripts.sync_once`лҘј м§Ғм ‘ мӢӨн–ү.
  #       web serviceлҠ” мӮ¬мҡ©мһҗ APIл§Ң мІҳлҰ¬, мһҗмӣҗ мҷ„м „ кІ©лҰ¬.
  # kindлі„ л№ҲлҸ„ м°Ёл“ұ + schedule л¶„мӮ°мңјлЎң лҸҷмӢң л¶Җн•ҳ нҡҢн”ј.
  # web serviceмқҳ SYNC_ENABLEDлҠ” dashboardм—җм„ң falseлЎң м„Өм • вҖ” лӮҙл¶Җ APScheduler л№„нҷңм„ұ.
  - type: cron
    name: dy-task-sync-projects
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "*/5 * * * *"          # л§Ө 5л¶„ :00
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind projects
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # к°Ғ cron serviceм—җ backend webкіј лҸҷмқјн•ң к°’мңјлЎң dashboardм—җм„ң мһ…л Ҙ н•„мҡ”.
      # (Render BlueprintлҠ” cron typeм—җм„ң fromService env share лҜём§Җмӣҗ)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false

  - type: cron
    name: dy-task-sync-tasks
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "2-59/5 * * * *"        # л§Ө 5л¶„ :02 (projectsмҷҖ 2л¶„ мҳӨн”„м…Ӣ)
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind tasks
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # к°Ғ cron serviceм—җ backend webкіј лҸҷмқјн•ң к°’мңјлЎң dashboardм—җм„ң мһ…л Ҙ н•„мҡ”.
      # (Render BlueprintлҠ” cron typeм—җм„ң fromService env share лҜём§Җмӣҗ)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false

  - type: cron
    name: dy-task-sync-master
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "*/30 * * * *"          # 30л¶„л§ҲлӢӨ :00
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind master
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # к°Ғ cron serviceм—җ backend webкіј лҸҷмқјн•ң к°’мңјлЎң dashboardм—җм„ң мһ…л Ҙ н•„мҡ”.
      # (Render BlueprintлҠ” cron typeм—җм„ң fromService env share лҜём§Җмӣҗ)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false

  - type: cron
    name: dy-task-sync-others
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "15,45 * * * *"         # 30л¶„л§ҲлӢӨ :15/:45 вҖ” clients+cashflow+expense мҲңм°Ё
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
    startCommand: |
      env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind clients && \
      env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind cashflow && \
      env -u VIRTUAL_ENV uv run python -m app.scripts.sync_once --kind expense
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # к°Ғ cron serviceм—җ backend webкіј лҸҷмқјн•ң к°’мңјлЎң dashboardм—җм„ң мһ…л Ҙ н•„мҡ”.
      # (Render BlueprintлҠ” cron typeм—җм„ң fromService env share лҜём§Җмӣҗ)
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false

  # в”Җв”Җ л§Өмқј м•„м№Ё task мһҗлҸҷ м§„н–ү нҠёлҰ¬кұ° в”Җв”Җ
  # мӢңмһ‘мқјмқҙ лҸ„лһҳн•ң taskлҘј 'м§„н–ү мӨ‘'мңјлЎң + к·ё н”„лЎңм қнҠё м§„н–үлӢЁкі„ 'м§„н–үмӨ‘'мңјлЎң.
  # KST 09:00 = UTC 00:00. Render cronмқҖ UTC кё°мӨҖ.
  - type: cron
    name: dy-task-auto-progress-cron
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "0 0 * * *"
    buildCommand: pip install httpx
    startCommand: |
      python -c "import os, httpx; r = httpx.post('https://api.dyce.kr/api/cron/auto-progress', headers={'Authorization': 'Bearer ' + os.environ['CRON_SECRET']}, timeout=60); print(r.status_code, r.text)"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CRON_SECRET
        sync: false
