services:
  - type: web
    name: dy-task-backend
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip uv
      env -u VIRTUAL_ENV uv sync --frozen --no-dev
      env -u VIRTUAL_ENV uv run alembic upgrade head
    startCommand: env -u VIRTUAL_ENV uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_PROJECTS
        sync: false
      - key: NOTION_DB_TASKS
        sync: false
      - key: NOTION_DB_CASHFLOW
        sync: false
      - key: NOTION_DB_EXPENSE
        sync: false
      - key: NOTION_DB_ASSIGN_LOG
        sync: false
      - key: NOTION_DB_CLIENTS
        sync: false
      - key: NOTION_DB_MASTER
        sync: false
      - key: CORS_ORIGINS
        value: https://task.dyce.kr,http://localhost:3000
      - key: SYNC_ENABLED
        value: "true"
      - key: SYNC_INTERVAL_MINUTES
        value: "5"
      - key: CRON_SECRET
        sync: false
      # ── NAVER WORKS OIDC SSO (Phase 1) ──
      # ENABLED는 운영자가 dashboard에서 toggle (value:로 박으면 재배포가 dashboard 값을 덮어씀)
      - key: WORKS_ENABLED
        sync: false
      - key: WORKS_CLIENT_ID
        sync: false
      - key: WORKS_CLIENT_SECRET
        sync: false
      - key: WORKS_DOMAIN_ID
        sync: false
      - key: WORKS_REDIRECT_URI
        value: https://api.dyce.kr/api/auth/works/callback
      - key: WORKS_ISSUER
        value: https://auth.worksmobile.com
      - key: FRONTEND_BASE_URL
        value: https://task.dyce.kr
      - key: WORKS_BLOCKED_EMAILS
        value: dyce@dyce.kr
