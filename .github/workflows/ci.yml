name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동일 PR/브랜치에 푸쉬가 연속되면 이전 실행 자동 cancel — 비용 절약.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + tsc + vitest + playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # PR-BH 1단계: works/bot 비활성 default. validate_runtime_settings 회피용
      JWT_SECRET: ci-test-secret
      WORKS_ENABLED: "false"
      WORKS_BOT_ENABLED: "false"
      WORKS_DRIVE_ENABLED: "false"
      WORKS_CALENDAR_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pytest
        run: uv run pytest tests/ -q

  docs:
    name: Docs audit (PR-EG, 4-H)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # docs_audit가 `git rev-parse`로 STATUS.md의 옛 commit hash까지 검증.
        # default shallow clone(depth=1)이면 옛 hash 누락으로 false negative 발생.
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run docs audit
        run: python scripts/docs_audit.py
